  ];

  var tagHTML = '<div style="font-size:13px;margin-bottom:8px"><strong>' + S.taggingTagged + '/' + S.taggingTotal + '</strong> post-start issues tagged = <strong>' + S.taggingPct + '%</strong></div>';
  tagHTML += '<div style="font-size:12px;color:#1e6b36;margin-bottom:6px">✓ +4 tagged today (TRI-53015 Mis-Planning, TRI-53082 Bug Discovery, TRI-53083 SLA Expected, TRI-53151 Dependency Unblock)</div>';

  });
  tagHTML += '</table></div>';
  document.getElementById('tagging-section').innerHTML = tagHTML;

  document.getElementById('timeline-title').textContent = 'Injection Timeline (Days 1–' + S.dayN + ')';
  var tlHTML = '<tr><th>Day</th><th>Date</th><th class="num-right">+Items</th><th class="num-right">+SP</th><th>Issues</th></tr>';
  S.injectionTimeline.forEach(function(row) {
    var issueStr = '—';
    if (row.issues && row.issues.length > 0) {
      issueStr = row.issues.map(function(iss) {
        var done = iss.done ? ' ✅' : '';
        var tag = iss.contamination ? ' [' + iss.contamination + ']' : ' <span style="color:#a63434">[NO TAG]</span>';
        return '<a href="' + JB + iss.key + '">' + iss.key + '</a>: ' + iss.summary + done + tag + ' — ' + iss.assignee;
      }).join('<br>');
    }
    var rowStyle = row.items >= 10 ? ' style="background:#fff9e6"' : '';

    var actual = new Array(S.totalDays).fill(null);
    actual[0] = S.totalItems;
    actual[S.dayN-1] = S.totalItems - S.doneItems;
    var slope = (actual[S.dayN-1] - actual[0]) / (S.dayN - 1);
    for (var j = 1; j < S.dayN - 1; j++) actual[j] = +(actual[0] + slope*j).toFixed(0);
    new Chart(document.getElementById('burndown-chart'), {
      type: 'line',
      data: { labels: labels, datasets: [
        { label: 'Ideal', data: ideal, borderColor: '#c0c0bc', borderDash: [4,3], pointRadius: 0, tension: 0 },
        { label: 'Actual', data: actual, borderColor: '#1e4f9d', backgroundColor: 'rgba(30,79,157,0.06)', pointRadius: 3, tension: 0, spanGaps: false }
      ]},

        { label: 'Cumul. Items', data: ii, borderColor: '#c9b375', pointRadius: 3, tension: 0 },
        { label: 'Cumul. SP', data: is2, borderColor: '#a63434', pointRadius: 3, tension: 0 }

    });

  var D = S.dashboard;
  var injPct = (S.trueInjection.count/S.totalItems*100).toFixed(1);
  document.getElementById('dashboard-table').innerHTML =
    '<tr><th>Signal</th><th>Dashboard value</th><th>Sprint context</th></tr>' +

    '<tr><td>Sprint contamination %</td><td>~' + injPct + '% items</td><td style="color:#a63434">⚠ Above 10% threshold; now exceeds S6801 final rate</td></tr>' +

    S.doneKeys.map(function(k){ return '<a href="' + JB + k + '">' + k + '</a>'; }).join(', ') + '</div>';

  document.getElementById('assessment').innerHTML =
    '<strong>Assessment (2026-06-12, Day 10/14):</strong> At Day 10 of 14 (71% through the sprint), completion stands at 40.7% of items (78 of 197 SP, 39.6%) against an ideal pace of 71.4% — the gap is substantial with 4 days remaining. ' +
    'The item injection rate (16.7%) has crossed above the prior sprint S6801\'s final rate of 21% items, signaling S5 is on a worse item-injection trajectory; however, SP injection (9.1%) remains well below S6801\'s 16%, meaning the added work is lighter in weight. ' +
