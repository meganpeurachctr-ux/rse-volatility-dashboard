  a { color: #1e4f9d; text-decoration: none; }

  .footer { font-size: 11px; color: #8a8a85; margin-top: 22px; }

<script>
document.addEventListener('DOMContentLoaded', function() {
  const S = SNAPSHOT;
  const JIRA_BASE = "https://toyotaresearchinstitute.atlassian.net/browse/";

  // Title
  document.getElementById('title').textContent = S.sprintName + ' — Day ' + S.dayN + ' of ' + S.totalDays + ' (' + S.snapshotDate + ')';
  document.getElementById('subtitle').textContent = 'Sprint health snapshot · ' + S.snapshotDate;

  // KPIs
  const idealBehind = S.pctItemsDone < S.idealPct;
  const injPct = +(S.trueInjection.count / S.totalItems * 100).toFixed(1);
  const kpiData = [
    { label: 'Total Items', val: S.totalItems, sub2: '' },
    { label: 'Total SP', val: S.totalSP, sub2: '' },
    { label: 'Items Done', val: S.doneItems + ' (' + S.pctItemsDone + '%)', sub2: 'Ideal: ' + S.idealPct + '%', cls: idealBehind ? 'red' : 'green' },
    { label: 'SP Done', val: S.doneSP + ' (' + S.pctSPDone + '%)', sub2: '', cls: idealBehind ? 'red' : 'green' },
    { label: 'Injections', val: S.trueInjection.count + ' (' + injPct + '%)', sub2: 'vs 21% S6801', cls: injPct > 15 ? 'amber' : 'green' },
    { label: 'Tag Coverage', val: S.taggingPct + '%', sub2: S.taggingTagged + '/' + S.taggingTotal + ' tagged', cls: S.taggingPct < 80 ? 'red' : 'green' }
  ];
  const kpisEl = document.getElementById('kpis');
  kpiData.forEach(function(k) {
    var d = document.createElement('div'); d.className = 'kpi';
    d.innerHTML = '<div class="label">' + k.label + '</div><div class="val ' + (k.cls||'') + '">' + k.val + '</div><div class="sub2">' + (k.sub2||'') + '</div>';
    kpisEl.appendChild(d);
  });

  // Status bar
  var donePct = S.pctItemsDone;
  var bar = document.getElementById('status-bar');
  bar.innerHTML = '<span style="width:' + donePct + '%;background:#1e6b36"></span><span style="width:' + (100-donePct) + '%;background:#f0f0ec"></span>';
  document.getElementById('progress-legend').textContent = donePct + '% done · ideal ' + S.idealPct + '% at Day ' + S.dayN;

  // Verdict
  var vColors = { green: '#1e6b36', amber: '#8a5a12', red: '#a63434' };
  var vd = document.getElementById('verdict');
  vd.innerHTML = '<span class="label">Verdict</span><span class="val" style="color:' + (vColors[S.verdictColor]||'#333') + '">' + S.verdictLabel + '</span>';

  // Scope table
  var st = document.getElementById('scope-table');
  st.innerHTML = '<thead><tr><th>Category</th><th class="num-right">Items</th><th class="num-right">SP</th><th class="num-right">% Items</th><th class="num-right">% SP</th></tr></thead>';
  var stb = st.createTBody();
  [
    ['Pre-sprint (before 2026-06-03)', S.preSprint.count, S.preSprint.sp],
    ['Day-1 planning dump (first 24h)', S.day1Dump.count, S.day1Dump.sp],
    ['True mid-sprint injections (days 2+)', S.trueInjection.count, S.trueInjection.sp],
  ].forEach(function(row) {
    var tr = stb.insertRow();
    tr.insertCell().textContent = row[0];
    tr.insertCell().className = 'num-right'; tr.cells[1].textContent = row[1];
    tr.insertCell().className = 'num-right'; tr.cells[2].textContent = row[2].toFixed(1);
    tr.insertCell().className = 'num-right'; tr.cells[3].textContent = (row[1]/S.totalItems*100).toFixed(1) + '%';
    tr.insertCell().className = 'num-right'; tr.cells[4].textContent = S.totalSP > 0 ? (row[2]/S.totalSP*100).toFixed(1) + '%' : 'N/A';
  });
  var tr = stb.insertRow(); tr.style.fontWeight = '600';
  tr.insertCell().textContent = 'Current total';
  tr.insertCell().className = 'num-right'; tr.cells[1].textContent = S.totalItems;
  tr.insertCell().className = 'num-right'; tr.cells[2].textContent = S.totalSP.toFixed(1);
  tr.insertCell().className = 'num-right'; tr.cells[3].textContent = '100%';
  tr.insertCell().className = 'num-right'; tr.cells[4].textContent = '100%';

  // Tagging section
  var ts = document.getElementById('tagging-section');
  var tagPct = S.taggingPct;
  var tagColor = tagPct >= 80 ? '#1e6b36' : tagPct >= 50 ? '#8a5a12' : '#a63434';
  ts.innerHTML = '<div style="font-size:24px;font-weight:600;color:' + tagColor + '">' + tagPct + '%</div><div style="font-size:12px;color:#6b6b66;margin:2px 0 8px">' + S.taggingTagged + ' of ' + S.taggingTotal + ' true injections tagged</div>';
  if (tagPct < 80) {
    var gapDiv = document.createElement('div'); gapDiv.className = 'tag-gap';
    gapDiv.innerHTML = '<strong>⚠ Process gap — below 80% threshold</strong>Backfill needed on ' + S.untaggedTrue.length + ' untagged items:';
    var ul = document.createElement('table');
    ul.innerHTML = '<thead><tr><th>Key</th><th>Date</th><th>Summary</th><th>Assignee</th></tr></thead>';
    var ulb = ul.createTBody();
    S.untaggedTrue.forEach(function(u) {
      var r = ulb.insertRow();
      r.insertCell().innerHTML = '<a href="' + JIRA_BASE + u.key + '" target="_blank">' + u.key + '</a>';
      r.insertCell().textContent = u.date;
      r.insertCell().textContent = u.summary.substring(0, 55) + (u.summary.length > 55 ? '...' : '');
      r.insertCell().textContent = u.assignee.replace(' (Contractor)', '');
    });
    gapDiv.appendChild(ul);
    ts.appendChild(gapDiv);
  }

  // Injection timeline
  var tl = document.getElementById('timeline-table');
  tl.innerHTML = '<thead><tr><th>Day</th><th>Date</th><th>+Items</th><th>+SP</th><th>Issues & Contamination</th><th>Notes</th></tr></thead>';
  var tlb = tl.createTBody();
  S.injectionTimeline.forEach(function(row) {
    var tr = tlb.insertRow();
    if (row.items > 5) tr.style.background = '#fff9f0';
    tr.insertCell().textContent = 'Day ' + row.day;
    tr.insertCell().textContent = row.date;
    tr.insertCell().className = 'num-right'; tr.cells[2].textContent = row.items > 0 ? '+' + row.items : '—';
    tr.insertCell().className = 'num-right'; tr.cells[3].textContent = row.sp > 0 ? '+' + row.sp.toFixed(1) : '—';
    var issCell = tr.insertCell();
    if (row.issues.length === 0) { issCell.textContent = '—'; issCell.className = 'muted'; }
    else {
      row.issues.forEach(function(iss) {
        var link = document.createElement('a'); link.href = JIRA_BASE + iss.key; link.target = '_blank'; link.textContent = iss.key;
        issCell.appendChild(link);
        var tag = iss.contamination ? ' [' + iss.contamination + ']' : ' [untagged]';
        issCell.appendChild(document.createTextNode(': ' + iss.summary.substring(0,40) + tag + ' '));
        issCell.appendChild(document.createElement('br'));
      });
    }
    var noteCell = tr.insertCell();
    if (row.day === 7) { noteCell.textContent = 'Day-7 burst (10 items) — mirrors S6801 Day-7 pattern'; noteCell.style.color = '#8a5a12'; }
    else noteCell.textContent = '—';
  });

  // Charts
  var days = Array.from({length: S.totalDays}, function(_, i) { return 'D' + (i+1); });
  var idealBurndown = days.map(function(_, i) { return +(S.totalItems * (1 - (i+1)/S.totalDays)).toFixed(1); });
  // Approximate actual: start at totalItems, mark done today
  var actualBurndown = days.map(function(_, i) {
    if (i < S.dayN) return S.totalItems - Math.round(S.doneItems * (i+1) / S.dayN);
    return null;
  });

  if (typeof Chart !== 'undefined') {
    new Chart(document.getElementById('burndown-chart'), {
      type: 'line',
      data: {
        labels: days,
        datasets: [
          { label: 'Ideal', data: idealBurndown, borderColor: '#aaa', borderDash: [4,4], pointRadius: 0, tension: 0.1 },
          { label: 'Actual', data: actualBurndown, borderColor: '#1e4f9d', backgroundColor: 'rgba(30,79,157,0.08)', pointRadius: 3, tension: 0.1 }
        ]
      },
      options: { plugins: { legend: { labels: { font: { size: 11 } } } }, scales: { y: { beginAtZero: true }, x: { ticks: { font: { size: 10 } } } } }
    });

    // Injection accumulation
    var cumItems = []; var cumSP = []; var runItems = 0; var runSP = 0;
    var dayInjMap = {};
    S.injectionTimeline.forEach(function(r) { dayInjMap[r.day] = r; });
    for (var d = 2; d <= S.totalDays; d++) {
      var r = dayInjMap[d];
      if (r) { runItems += r.items; runSP += r.sp; }
      cumItems.push(runItems); cumSP.push(runSP);
    }
    var injLabels = Array.from({length: S.totalDays - 1}, function(_, i) { return 'D' + (i+2); });
    new Chart(document.getElementById('injection-chart'), {
      type: 'bar',
      data: {
        labels: injLabels,
        datasets: [
          { label: 'Cumulative items', data: cumItems, backgroundColor: 'rgba(163,52,52,0.55)', yAxisID: 'y' },
          { label: 'Cumulative SP', data: cumSP, backgroundColor: 'rgba(30,79,157,0.35)', yAxisID: 'y' }
        ]
      },
      options: { plugins: { legend: { labels: { font: { size: 11 } } } }, scales: { y: { beginAtZero: true }, x: { ticks: { font: { size: 10 } } } } }
    });
  }

  // Dashboard table
  var dt = document.getElementById('dashboard-table');
  dt.innerHTML = '<thead><tr><th>Signal</th><th>Dashboard Value</th><th>Assessment</th></tr></thead>';
  var dtb = dt.createTBody();
  [
    ['Priority Changed', S.dashboard.priorityChanged + ' of ' + S.dashboard.priorityChangedOf + ' (' + S.dashboard.priorityChangedPct + '%)', 'Elevated — more than half of sprint issues re-prioritized'],
    ['Estimate Changes', S.dashboard.estimateChanges, 'Clean'],
    ['Refinements', S.dashboard.refinements, 'No refinements tracked'],
    ['Monthly Churn Rate', S.dashboard.churnRate + '%', 'Clean'],
    ['Dashboard Updated', S.dashboard.updatedDate, 'Current']
  ].forEach(function(row) {
    var tr = dtb.insertRow();
    row.forEach(function(c) { tr.insertCell().textContent = c; });
  });

  // Assignee table
  var at = document.getElementById('assignee-table');
  at.innerHTML = '<thead><tr><th>Assignee</th><th class="num-right">Done</th><th class="num-right">Total</th><th class="num-right">% Done</th><th class="num-right">SP Done</th><th class="num-right">SP Total</th></tr></thead>';
  var atb = at.createTBody();
  S.assigneeStats.forEach(function(row) {
    var tr = atb.insertRow();
    tr.insertCell().textContent = row.name.replace(' (Contractor)', '');
    tr.insertCell().className = 'num-right'; tr.cells[1].textContent = row.done;
    tr.insertCell().className = 'num-right'; tr.cells[2].textContent = row.total;
    var pct = row.total > 0 ? (row.done/row.total*100).toFixed(0) + '%' : '—';
    var pctCell = tr.insertCell(); pctCell.className = 'num-right'; pctCell.textContent = pct;
    if (row.done === 0 && row.total > 0) pctCell.style.color = '#a63434';
    tr.insertCell().className = 'num-right'; tr.cells[4].textContent = row.spDone;
    tr.insertCell().className = 'num-right'; tr.cells[5].textContent = row.spTotal;
  });

  // Done table
  var don = document.getElementById('done-table');
  don.innerHTML = '<thead><tr><th>Key</th><th>Summary</th><th class="num-right">SP</th><th>Assignee</th></tr></thead>';
  var donb = don.createTBody();
  S.doneIssues.forEach(function(iss) {
    var tr = donb.insertRow();
    tr.insertCell().innerHTML = '<a href="' + JIRA_BASE + iss.key + '" target="_blank">' + iss.key + '</a>';
    tr.insertCell().textContent = iss.summary;
    tr.insertCell().className = 'num-right'; tr.cells[2].textContent = iss.sp || '—';
    tr.insertCell().textContent = iss.assignee.replace(' (Contractor)', '');
  });

  // Assessment
  document.getElementById('assessment').innerHTML = '<strong>Assessment (2026-06-10):</strong> Completion stands at 32.4% of items and 30.1% of SP against a Day-8 ideal of 57.1% — the team needs to close roughly 25 percentage points in the remaining 7 days. The biggest risk is the contamination tagging gap: only 3 of 14 true mid-sprint injections are tagged (21.4%), making root-cause analysis unreliable. A 10-item burst on 2026-06-09 (Day 7) mirrors the exact same single-day spike seen in S6801 and appears to be a recurring pattern worth addressing in retro. On the positive side, total injection volume (13.3% items / 6.6% SP) is well below the S6801 reference (21%/16%), indicating scope containment is improving. The elevated priority change rate (58.1%) may be contributing to velocity drag and should be monitored.';

  // Footer
  document.getElementById('footer').innerHTML = 'Frozen snapshot · 2026-06-10 · <a href="https://meganpeurachctr-ux.github.io/rse-volatility-dashboard/sprint-health-latest.html">Live URL</a>';
});
</script>
</div>
