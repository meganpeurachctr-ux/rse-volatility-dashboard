<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSE 26Q2 S5 — Day 3 of 14 (2026-06-05)</title>
<script>
const SNAPSHOT = {
  sprintName: "RSE 26Q2 S5 6/3-6/17",
  sprintStart: "2026-06-03",
  sprintEnd: "2026-06-17",
  today: "2026-06-05",
  currentDay: 3,
  totalDays: 14,
  idealPct: 21.4,
  totalItems: 93,
  totalSP: 183.0,
  doneItems: 4,
  doneSP: 6.0,
  doneItemsPct: 4.3,
  doneSPpct: 3.3,
  preItems: 88, preSP: 176.0, preItemsPct: 94.6, preSPpct: 96.2,
  day1Items: 2, day1SP: 3.0, day1ItemsPct: 2.2, day1SPpct: 1.6,
  injItems: 3, injSP: 4.0, injItemsPct: 3.2, injSPpct: 2.2,
  contamTagged: 2, contamTotal: 5, contamPct: 40.0,
  untagged: [
    { key: "TRI-53015", date: "2026-06-04", summary: "Update look and feel of bottom bar", assignee: "Nadimpalli Varma (Contractor)" },
    { key: "TRI-53019", date: "2026-06-04", summary: "Integrate cognito UI", assignee: "Veera Raghavulu (Contractor)" }
  ],
  timeline: [
    { day: 1, date: "2026-06-03", items: 1, sp: 1.0, bucket: "day1", issues: [
      { key: "TRI-52985", summary: "Move iPad app from old repo to new repo (hmir)", contam: null, assignee: "Ashish Mangukiya (Contractor)" }
    ]},
    { day: 2, date: "2026-06-04", items: 4, sp: 6.0, bucket: "injection", issues: [
      { key: "TRI-53009", summary: "Improve Jira task output formatting in chatbot UI", contam: "Unexpected Capacity", assignee: "Devang Motwani" },
      { key: "TRI-53013", summary: "validate with Eric's real car model", contam: "Dependency Unblock", assignee: "Chris Fajardo" },
      { key: "TRI-53015", summary: "Update look and feel of bottom bar", contam: null, assignee: "Nadimpalli Varma (Contractor)" },
      { key: "TRI-53019", summary: "Integrate cognito UI", contam: null, assignee: "Veera Raghavulu (Contractor)" }
    ]}
  ],
  priorFinal: { items: 138, sp: 214.5, injItemsPct: 21, injSPpct: 16, doneItemsPct: 89, doneSPpct: 91 },
  dashboard: { priorityChanged: 30, priorityChangedPct: 43.5, estimateChanges: 0, refinements: 0, churnRate: 3.4, lastUpdated: "2026-06-03" }
};
</script>
<style>
  :root { color-scheme: light; }
  html, body { margin: 0; padding: 0; background: #fafaf7; color: #1d1d1b; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif; }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 20px 24px 48px; }
  h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px; letter-spacing: -0.01em; }
  h2 { font-size: 15px; font-weight: 600; margin: 28px 0 10px; letter-spacing: -0.01em; color: #1d1d1b; }
  .sub { color: #6b6b66; font-size: 13px; margin-bottom: 18px; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; margin-left: 6px; }
  .pill.green { background: #e6f4ea; color: #1e6b36; }
  .pill.amber { background: #fff4e0; color: #8a5a12; }
  .pill.red   { background: #fdeaea; color: #a63434; }
  .pill.blue  { background: #e8f0fb; color: #1e4f9d; }
  .pill.gray  { background: #eee; color: #555; }
  .kpis { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin: 10px 0 4px; }
  .kpi { background: #fff; border: 1px solid #ececea; border-radius: 10px; padding: 12px 12px 10px; }
  .kpi .label { font-size: 11px; color: #6b6b66; text-transform: uppercase; letter-spacing: 0.04em; }
  .kpi .val { font-size: 22px; font-weight: 600; margin-top: 4px; line-height: 1.1; }
  .kpi .val.red { color: #a63434; }
  .kpi .val.amber { color: #8a5a12; }
  .kpi .val.green { color: #1e6b36; }
  .kpi .sub2 { font-size: 11px; color: #8a8a85; margin-top: 2px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card { background: #fff; border: 1px solid #ececea; border-radius: 12px; padding: 16px 18px; margin-top: 12px; }
  .card h3 { margin: 0 0 8px; font-size: 13px; font-weight: 600; color: #3a3a36; letter-spacing: -0.005em; }
  .card .note { font-size: 12px; color: #6b6b66; margin-bottom: 10px; }
  table { border-collapse: collapse; width: 100%; font-size: 12.5px; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #f0f0ec; }
  th { color: #6b6b66; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em; }
  .muted { color: #8a8a85; }
  .assess { background: #f7f7f3; border-left: 3px solid #c9b375; padding: 10px 14px; border-radius: 6px; font-size: 13px; line-height: 1.5; margin-top: 12px; }
  .verdict { display: flex; gap: 12px; align-items: baseline; margin: 4px 0 12px; }
  .verdict .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: #6b6b66; }
  .verdict .val { font-size: 15px; font-weight: 600; }
  .status-bar { display: flex; height: 10px; border-radius: 6px; overflow: hidden; background: #f0f0ec; margin: 8px 0 4px; }
  .status-bar span { display: block; height: 100%; }
  canvas { max-width: 100%; }
  .gridline { height: 1px; background: #ececea; margin: 22px 0 0; }
  a { color: #1e4f9d; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .footer { font-size: 11px; color: #8a8a85; margin-top: 22px; }
  .num-right { text-align: right; font-variant-numeric: tabular-nums; }
  .tag-gap { background: #fdeaea; border: 1px solid #f5c6c6; border-radius: 6px; padding: 8px 12px; font-size: 12px; color: #7a2020; margin-top: 8px; }
  .tag-gap strong { display: block; margin-bottom: 2px; }
  .trend-warn { background: #fff4e0; border: 1px solid #f5d98a; border-radius: 6px; padding: 8px 12px; font-size: 12px; color: #7a4a00; margin-top: 8px; }
  @media (max-width: 820px){ .kpis { grid-template-columns: repeat(3, 1fr); } .row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <h1 id="sprint-title"></h1>
  <div class="sub" id="sprint-sub"></div>

  <!-- KPI tiles -->
  <div class="kpis" id="kpi-row"></div>

  <!-- Progress bar -->
  <div class="card" style="margin-top:12px">
    <h3>Sprint Progress</h3>
    <div class="status-bar" id="status-bar"></div>
    <div style="font-size:11px;color:#6b6b66;margin-top:3px;" id="progress-legend"></div>
  </div>

  <!-- Verdict -->
  <h2>Sprint Volatility</h2>
  <div class="verdict"><span class="label">Verdict</span><span class="val" id="verdict-val"></span></div>
  <div class="assess" id="volatility-text"></div>

  <!-- Scope Composition -->
  <h2>Scope Composition</h2>
  <div class="card">
    <table id="scope-table"></table>
  </div>

  <!-- Daily Injection Timeline -->
  <h2>Injection Timeline</h2>
  <div class="card" style="overflow-x:auto">
    <table id="timeline-table"></table>
  </div>

  <!-- Contamination Tagging -->
  <h2>Contamination Tagging Coverage</h2>
  <div class="card">
    <div id="contam-summary"></div>
    <div id="contam-untagged"></div>
  </div>

  <!-- Charts row -->
  <h2>Burndown &amp; Velocity</h2>
  <div class="row">
    <div class="card"><h3>Items Done vs. Ideal</h3><canvas id="burndown-chart" height="180"></canvas></div>
    <div class="card"><h3>SP Done vs. Ideal</h3><canvas id="velocity-chart" height="180"></canvas></div>
  </div>

  <!-- Dashboard cross-ref -->
  <h2>Volatility Dashboard Cross-Reference</h2>
  <div class="card">
    <table id="dashboard-table"></table>
  </div>

  <!-- Assessment -->
  <h2>Assessment</h2>
  <div class="assess" id="assessment-text"></div>

  <div class="footer" id="footer-text"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  const D = SNAPSHOT;
  const JIRA = 'https://toyotaresearchinstitute.atlassian.net/browse/';

  // Title & sub
  document.getElementById('sprint-title').textContent = D.sprintName + ' — Day ' + D.currentDay + ' of ' + D.totalDays + ' (' + D.today + ')';
  document.getElementById('sprint-sub').textContent = 'Sprint ' + D.sprintStart + ' → ' + D.sprintEnd + ' · Snapshot generated ' + D.today;

  // KPI tiles
  const kpis = [
    { label: 'Total Items', val: D.totalItems, sub: 'in sprint', cls: '' },
    { label: 'Total SP', val: D.totalSP, sub: 'story points', cls: '' },
    { label: 'Items Done', val: D.doneItems + ' (' + D.doneItemsPct + '%)', sub: 'ideal ' + D.idealPct + '%', cls: D.doneItemsPct >= D.idealPct * 0.75 ? 'green' : 'amber' },
    { label: 'SP Done', val: D.doneSP + ' (' + D.doneSPpct + '%)', sub: 'ideal ' + D.idealPct + '%', cls: D.doneSPpct >= D.idealPct * 0.75 ? 'green' : 'amber' },
    { label: 'True Injections', val: D.injItems + ' (' + D.injItemsPct + '%)', sub: 'items / ' + D.injSPpct + '% SP', cls: D.injItemsPct > 10 ? 'red' : D.injItemsPct > 5 ? 'amber' : 'green' },
    { label: 'Tag Coverage', val: D.contamPct + '%', sub: D.contamTagged + '/' + D.contamTotal + ' tagged', cls: D.contamPct >= 80 ? 'green' : D.contamPct >= 50 ? 'amber' : 'red' }
  ];
  const kpiRow = document.getElementById('kpi-row');
  kpis.forEach(function(k) {
    kpiRow.innerHTML += '<div class="kpi"><div class="label">' + k.label + '</div><div class="val ' + k.cls + '">' + k.val + '</div><div class="sub2">' + k.sub + '</div></div>';
  });

  // Status bar
  const donePct = D.doneItemsPct;
  const inProgPct = 0;
  const todoPct = 100 - donePct;
  document.getElementById('status-bar').innerHTML =
    '<span style="width:' + donePct + '%;background:#1e6b36"></span>' +
    '<span style="width:' + inProgPct + '%;background:#e8a01e"></span>' +
    '<span style="width:' + todoPct + '%;background:#f0f0ec"></span>';
  document.getElementById('progress-legend').innerHTML =
    'Done: ' + D.doneItems + ' items (' + D.doneItemsPct + '%) &nbsp;|&nbsp; Ideal at Day ' + D.currentDay + ': ' + D.idealPct + '% &nbsp;|&nbsp; Remaining: ' + (D.totalItems - D.doneItems) + ' items';

  // Verdict
  const injPct = D.injItemsPct;
  let verdictText, verdictCls;
  if (injPct <= 5) { verdictText = 'Healthy (so far)'; verdictCls = 'green'; }
  else if (injPct <= 15) { verdictText = 'Moderately Volatile'; verdictCls = 'amber'; }
  else { verdictText = 'Highly Volatile'; verdictCls = 'red'; }
  document.getElementById('verdict-val').innerHTML = '<span class="pill ' + verdictCls + '">' + verdictText + '</span>';

  document.getElementById('volatility-text').innerHTML =
    'At Day ' + D.currentDay + ' of ' + D.totalDays + ', true mid-sprint injections stand at <strong>' + D.injItemsPct + '% of items</strong> and <strong>' + D.injSPpct + '% of SP</strong> — well below the ~10% agile guideline and significantly behind the Sprint S4 final rate of ' + D.priorFinal.injItemsPct + '% items / ' + D.priorFinal.injSPpct + '% SP. It is early; no single-day spike comparable to Sprint 6801\'s Day 7 burst (10 items added on 2026-04-14) has occurred yet.';

  // Scope composition table
  const scopeHtml = '<tr><th>Category</th><th class="num-right">Items</th><th class="num-right">SP</th><th class="num-right">% Items</th><th class="num-right">% SP</th></tr>' +
    '<tr><td>Pre-sprint (before ' + D.sprintStart + ')</td><td class="num-right">' + D.preItems + '</td><td class="num-right">' + D.preSP + '</td><td class="num-right">' + D.preItemsPct + '%</td><td class="num-right">' + D.preSPpct + '%</td></tr>' +
    '<tr><td>Day 1 planning dump (first 24h)</td><td class="num-right">' + D.day1Items + '</td><td class="num-right">' + D.day1SP + '</td><td class="num-right">' + D.day1ItemsPct + '%</td><td class="num-right">' + D.day1SPpct + '%</td></tr>' +
    '<tr><td>True mid-sprint injections (days 2+)</td><td class="num-right">' + D.injItems + '</td><td class="num-right">' + D.injSP + '</td><td class="num-right">' + D.injItemsPct + '%</td><td class="num-right">' + D.injSPpct + '%</td></tr>' +
    '<tr style="font-weight:600"><td>Current sprint total</td><td class="num-right">' + D.totalItems + '</td><td class="num-right">' + D.totalSP + '</td><td class="num-right">—</td><td class="num-right">—</td></tr>';
  document.getElementById('scope-table').innerHTML = scopeHtml;

  // Timeline table
  let tlHtml = '<tr><th>Sprint Day</th><th>Date</th><th class="num-right">+Items</th><th class="num-right">+SP</th><th>Bucket</th><th>Issues & Contamination</th></tr>';
  D.timeline.forEach(function(row) {
    const bucketLabel = row.bucket === 'day1' ? '<span class="pill blue">Day-1 Dump</span>' : '<span class="pill amber">True Injection</span>';
    const issueRows = row.issues.map(function(i) {
      const tag = i.contam ? '<span class="pill gray">' + i.contam + '</span>' : '<span class="pill red">NO TAG</span>';
      return '<a href="' + JIRA + i.key + '" target="_blank">' + i.key + '</a> ' + i.summary + ' ' + tag + ' <span class="muted">— ' + i.assignee + '</span>';
    }).join('<br>');
    tlHtml += '<tr><td>Day ' + row.day + '</td><td>' + row.date + '</td><td class="num-right">' + row.items + '</td><td class="num-right">' + row.sp + '</td><td>' + bucketLabel + '</td><td>' + issueRows + '</td></tr>';
  });
  document.getElementById('timeline-table').innerHTML = tlHtml;

  // Contamination tagging
  const contamCls = D.contamPct >= 80 ? 'green' : D.contamPct >= 50 ? 'amber' : 'red';
  document.getElementById('contam-summary').innerHTML =
    '<strong>' + D.contamTagged + '/' + D.contamTotal + ' post-start issues tagged = <span style="color:' + (D.contamPct < 80 ? '#a63434' : '#1e6b36') + '">' + D.contamPct + '%</span></strong>';

  if (D.untagged.length > 0) {
    let untaggedHtml = '<div class="tag-gap" style="margin-top:10px"><strong>⚠ ' + D.untagged.length + ' untagged true mid-sprint injection(s) — backfill needed</strong>';
    untaggedHtml += '<table style="margin-top:6px"><tr><th>Key</th><th>Date</th><th>Summary</th><th>Assignee</th></tr>';
    D.untagged.forEach(function(u) {
      untaggedHtml += '<tr><td><a href="' + JIRA + u.key + '" target="_blank">' + u.key + '</a></td><td>' + u.date + '</td><td>' + u.summary + '</td><td>' + u.assignee + '</td></tr>';
    });
    untaggedHtml += '</table></div>';
    document.getElementById('contam-untagged').innerHTML = untaggedHtml;
  }

  // Charts
  if (typeof Chart !== 'undefined') {
    // Burndown
    const days = Array.from({length: D.totalDays}, function(_, i) { return 'Day ' + (i+1); });
    const idealCurve = days.map(function(_, i) { return Math.round((i+1)/D.totalDays * D.totalItems * 10) / 10; });
    const actualItems = days.map(function(_, i) { return i < D.currentDay ? (i === D.currentDay - 1 ? D.doneItems : null) : null; });
    // Fill in earlier days as 0 if not available
    actualItems[0] = 0; actualItems[D.currentDay-1] = D.doneItems;

    new Chart(document.getElementById('burndown-chart'), {
      type: 'line',
      data: {
        labels: days,
        datasets: [
          { label: 'Ideal', data: idealCurve, borderColor: '#adadaa', borderDash: [4,3], pointRadius: 0, borderWidth: 1.5, fill: false },
          { label: 'Actual', data: actualItems, borderColor: '#1e4f9d', backgroundColor: 'rgba(30,79,157,0.08)', pointRadius: 3, borderWidth: 2, spanGaps: false }
        ]
      },
      options: { plugins: { legend: { labels: { font: { size: 11 } } } }, scales: { y: { beginAtZero: true } }, responsive: true, maintainAspectRatio: true }
    });

    // SP velocity
    const idealSP = days.map(function(_, i) { return Math.round((i+1)/D.totalDays * D.totalSP * 10) / 10; });
    const actualSP = days.map(function(_, i) { return null; });
    actualSP[0] = 0; actualSP[D.currentDay-1] = D.doneSP;

    new Chart(document.getElementById('velocity-chart'), {
      type: 'line',
      data: {
        labels: days,
        datasets: [
          { label: 'Ideal SP', data: idealSP, borderColor: '#adadaa', borderDash: [4,3], pointRadius: 0, borderWidth: 1.5, fill: false },
          { label: 'Actual SP', data: actualSP, borderColor: '#2e8b57', backgroundColor: 'rgba(46,139,87,0.08)', pointRadius: 3, borderWidth: 2, spanGaps: false }
        ]
      },
      options: { plugins: { legend: { labels: { font: { size: 11 } } } }, scales: { y: { beginAtZero: true } }, responsive: true, maintainAspectRatio: true }
    });
  }

  // Dashboard cross-ref table
  document.getElementById('dashboard-table').innerHTML =
    '<tr><th>Signal</th><th>Dashboard Value</th><th>Context</th></tr>' +
    '<tr><td>Priority changed</td><td>' + D.dashboard.priorityChanged + ' of 69 issues (' + D.dashboard.priorityChangedPct + '%)</td><td>Reflects prior sprint data (last updated ' + D.dashboard.lastUpdated + ')</td></tr>' +
    '<tr><td>Estimate change count</td><td>' + D.dashboard.estimateChanges + ' re-estimations</td><td>Early sprint, expected to grow</td></tr>' +
    '<tr><td>Refinement count</td><td>' + D.dashboard.refinements + '</td><td>Not yet tracked for S5</td></tr>' +
    '<tr><td>Sprint contamination %</td><td>Calculating…</td><td>' + D.injItemsPct + '% items injected so far (true mid-sprint)</td></tr>' +
    '<tr><td>Monthly churn rate</td><td>' + D.dashboard.churnRate + '%</td><td>Low — 1 churned / 29 resolved; signal of healthy execution</td></tr>';

  // Assessment
  document.getElementById('assessment-text').innerHTML =
    'At Day ' + D.currentDay + ' of ' + D.totalDays + ', scope injection is low (' + D.injItemsPct + '% items / ' + D.injSPpct + '% SP relative to the prior sprint\'s ' + D.priorFinal.injItemsPct + '% / ' + D.priorFinal.injSPpct + '% final rate). Completion is ' + D.doneItemsPct + '% items / ' + D.doneSPpct + '% SP against an ideal of ' + D.idealPct + '% for this day in the sprint — the team is noticeably behind the ideal pace, though Day 3 typically has low throughput. The main risk is contamination tagging coverage at ' + D.contamPct + '%: 2 of 3 true mid-sprint injections (TRI-53015, TRI-53019) and the day-1 dump item (TRI-52985) lack a contamination source tag — these should be backfilled before end of day 2026-06-05. No injection spike comparable to Sprint 6801\'s Day 7 burst has occurred yet.';

  // Footer
  document.getElementById('footer-text').textContent = 'Frozen snapshot · ' + D.today + ' · Live URL: https://meganpeurachctr-ux.github.io/rse-volatility-dashboard/sprint-health-latest.html';
});
</script>
</body>
</html>
