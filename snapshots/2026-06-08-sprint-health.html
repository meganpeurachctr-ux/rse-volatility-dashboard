<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSE 26Q2 S5 — Day 6 Sprint Health (2026-06-08)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<style>
  :root { color-scheme: light; }
  html, body { margin: 0; padding: 0; background: #fafaf7; color: #1d1d1b; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif; }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 20px 24px 48px; }
  h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px; letter-spacing: -0.01em; }
  h2 { font-size: 15px; font-weight: 600; margin: 28px 0 10px; letter-spacing: -0.01em; color: #1d1d1b; }
  .sub { color: #6b6b66; font-size: 13px; margin-bottom: 18px; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; margin-left: 6px; }
  .pill.green { background: #e6f4ea; color: #1e6b36; }
  .pill.amber { background: #fff4e0; color: #8a5a12; }
  .pill.red   { background: #fdeaea; color: #a63434; }
  .pill.blue  { background: #e8f0fb; color: #1e4f9d; }
  .pill.gray  { background: #eee; color: #555; }
  .kpis { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin: 10px 0 4px; }
  .kpi { background: #fff; border: 1px solid #ececea; border-radius: 10px; padding: 12px 12px 10px; }
  .kpi .label { font-size: 11px; color: #6b6b66; text-transform: uppercase; letter-spacing: 0.04em; }
  .kpi .val { font-size: 22px; font-weight: 600; margin-top: 4px; line-height: 1.1; }
  .kpi .val.red { color: #a63434; }
  .kpi .val.amber { color: #8a5a12; }
  .kpi .val.green { color: #1e6b36; }
  .kpi .sub2 { font-size: 11px; color: #8a8a85; margin-top: 2px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card { background: #fff; border: 1px solid #ececea; border-radius: 12px; padding: 16px 18px; margin-top: 12px; }
  .card h3 { margin: 0 0 8px; font-size: 13px; font-weight: 600; color: #3a3a36; letter-spacing: -0.005em; }
  .card .note { font-size: 12px; color: #6b6b66; margin-bottom: 10px; }
  table { border-collapse: collapse; width: 100%; font-size: 12.5px; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #f0f0ec; }
  th { color: #6b6b66; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em; }
  .muted { color: #8a8a85; }
  .assess { background: #f7f7f3; border-left: 3px solid #c9b375; padding: 10px 14px; border-radius: 6px; font-size: 13px; line-height: 1.5; margin-top: 12px; }
  .verdict { display: flex; gap: 12px; align-items: baseline; margin: 4px 0 12px; }
  .verdict .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: #6b6b66; }
  .verdict .val { font-size: 15px; font-weight: 600; }
  .status-bar { display: flex; height: 10px; border-radius: 6px; overflow: hidden; background: #f0f0ec; margin: 8px 0 4px; }
  .status-bar span { display: block; height: 100%; }
  canvas { max-width: 100%; }
  .gridline { height: 1px; background: #ececea; margin: 22px 0 0; }
  a { color: #1e4f9d; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .footer { font-size: 11px; color: #8a8a85; margin-top: 22px; }
  .num-right { text-align: right; font-variant-numeric: tabular-nums; }
  .tag-gap { background: #fdeaea; border: 1px solid #f5c6c6; border-radius: 6px; padding: 8px 12px; font-size: 12px; color: #7a2020; margin-top: 8px; }
  .tag-gap strong { display: block; margin-bottom: 2px; }
  .trend-warn { background: #fff4e0; border: 1px solid #f5d98a; border-radius: 6px; padding: 8px 12px; font-size: 12px; color: #7a4a00; margin-top: 8px; }
  @media (max-width: 820px){ .kpis { grid-template-columns: repeat(3, 1fr); } .row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="wrap">
<script>
const SNAPSHOT = {
  sprintName: "RSE 26Q2 S5 6/3-6/17",
  snapshotDate: "2026-06-08",
  dayN: 6,
  totalDays: 14,
  totalItems: 93,
  totalSP: 183.0,
  doneItems: 6,
  doneSP: 9.0,
  pctItemsDone: 6.5,
  pctSPDone: 4.9,
  idealPct: 42.9,
  preSprint: { count: 88, sp: 176.0 },
  day1Dump: { count: 2, sp: 3.0 },
  trueInjection: { count: 3, sp: 4.0 },
  taggingTagged: 2,
  taggingTotal: 5,
  taggingPct: 40.0,
  verdictLabel: "Healthy (so far)",
  verdictColor: "green",
  untaggedTrue: [
    { key: "TRI-52985", date: "2026-06-03", bucket: "Day-1 dump", summary: "Move iPad app from old repo to new repo", assignee: "Ashish Mangukiya" },
    { key: "TRI-53015", date: "2026-06-04", bucket: "True injection", summary: "Update look and feel of bottom bar", assignee: "Nadimpalli Varma" },
    { key: "TRI-53019", date: "2026-06-04", bucket: "True injection", summary: "Integrate cognito UI", assignee: "Veera Raghavulu" }
  ],
  injectionTimeline: [
    { day: 1, date: "2026-06-03", items: 1, sp: 1.0, issues: [{ key: "TRI-52985", summary: "Move iPad app from old repo to new repo", assignee: "Ashish Mangukiya", contamination: null, bucket: "Day-1 dump" }] },
    { day: 2, date: "2026-06-04", items: 4, sp: 6.0, issues: [
      { key: "TRI-53009", summary: "Improve Jira task output formatting in chatbot UI", assignee: "Devang Motwani", contamination: "Unexpected Capacity", bucket: "Day-1 dump", done: true },
      { key: "TRI-53013", summary: "validate with Eric's real car model", assignee: "Chris Fajardo", contamination: "Dependency Unblock", bucket: "True injection" },
      { key: "TRI-53015", summary: "Update look and feel of bottom bar", assignee: "Nadimpalli Varma", contamination: null, bucket: "True injection" },
      { key: "TRI-53019", summary: "Integrate cognito UI", assignee: "Veera Raghavulu", contamination: null, bucket: "True injection" }
    ]},
    { day: 3, date: "2026-06-05", items: 0, sp: 0, issues: [] },
    { day: 4, date: "2026-06-06", items: 0, sp: 0, issues: [] },
    { day: 5, date: "2026-06-07", items: 0, sp: 0, issues: [] },
    { day: 6, date: "2026-06-08", items: 0, sp: 0, issues: [] }
  ],
  doneIssues: [
    { key: "TRI-51540", summary: "Try out Claude Agent Teams and use it to develop a feature", sp: 2, assignee: "Devang Motwani" },
    { key: "TRI-52421", summary: "Add data from api into new Skill Review Design", sp: 1, assignee: "Ashish Mangukiya" },
    { key: "TRI-52778", summary: "WFM - Data Loader Module - Familiarize with WFM repo", sp: 1, assignee: "Jose Rojas" },
    { key: "TRI-52866", summary: "Fix the pupil data not loading in the csv file", sp: 1, assignee: "Michael Puzon" },
    { key: "TRI-52887", summary: "E2E test: Fix Mechanism test scripts failures", sp: 2, assignee: "Priyadharshan Pargunan" },
    { key: "TRI-53009", summary: "Improve Jira task output formatting in chatbot UI", sp: 2, assignee: "Devang Motwani" }
  ],
  dashboard: {
    priorityChanged: 35, priorityChangedPct: 59.3, priorityChangedOf: 59,
    estimateChanges: 0,
    refinements: 0,
    churnRate: 0.0,
    updatedDate: "2026-06-04"
  },
  baseline6801: { itemsPct: 21, spPct: 16 }
};
</script>

<h1 id="title"></h1>
<div class="sub" id="subtitle"></div>

<div class="kpis" id="kpis"></div>

<div id="progress-bar-section">
  <div class="card" style="margin-top:12px">
    <h3>Sprint Progress</h3>
    <div class="status-bar" id="status-bar"></div>
    <div style="font-size:11px;color:#6b6b66;margin-top:3px;" id="progress-legend"></div>
  </div>
</div>

<div class="verdict" id="verdict"></div>

<div class="row">
  <div class="card">
    <h3>Scope Composition</h3>
    <table id="scope-table"></table>
  </div>
  <div class="card">
    <h3>Contamination Tagging Coverage</h3>
    <div id="tagging-section"></div>
  </div>
</div>

<div class="card" style="overflow-x:auto">
  <h3>Injection Timeline (Days 1–6)</h3>
  <table id="timeline-table"></table>
</div>

<div class="row">
  <div class="card">
    <h3>Burndown (Items)</h3>
    <canvas id="burndown-chart" height="180"></canvas>
  </div>
  <div class="card">
    <h3>Injection Accumulation</h3>
    <canvas id="injection-chart" height="180"></canvas>
  </div>
</div>

<div class="card">
  <h3>Volatility Dashboard Cross-Reference <span class="pill gray">Updated 2026-06-04</span></h3>
  <table id="dashboard-table"></table>
</div>

<div class="card">
  <h3>Items Completed</h3>
  <table id="done-table"></table>
</div>

<div class="assess" id="assessment"></div>

<div class="footer" id="footer"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const S = SNAPSHOT;
  const JIRA_BASE = "https://toyotaresearchinstitute.atlassian.net/browse/";

  // Title
  document.getElementById('title').textContent = S.sprintName + ' — Day ' + S.dayN + ' of ' + S.totalDays + ' (' + S.snapshotDate + ')';
  document.getElementById('subtitle').textContent = 'Sprint health snapshot · ' + S.snapshotDate;

  // KPIs
  const idealBehind = S.pctItemsDone < S.idealPct;
  const kpiData = [
    { label: 'Total Items', val: S.totalItems, sub2: '' },
    { label: 'Total SP', val: S.totalSP, sub2: '' },
    { label: 'Items Done', val: S.doneItems + ' (' + S.pctItemsDone + '%)', sub2: 'Ideal: ' + S.idealPct + '%', cls: idealBehind ? 'red' : 'green' },
    { label: 'SP Done', val: S.doneSP + ' (' + S.pctSPDone + '%)', sub2: 'Day ' + S.dayN + ' of ' + S.totalDays, cls: S.pctSPDone < S.idealPct ? 'red' : 'green' },
    { label: 'True Injections', val: S.trueInjection.count + ' (' + (S.trueInjection.count/S.totalItems*100).toFixed(1) + '%)', sub2: S.trueInjection.sp + ' SP', cls: S.trueInjection.count > 0 ? 'amber' : 'green' },
    { label: 'Tag Coverage', val: S.taggingPct + '%', sub2: S.taggingTagged + '/' + S.taggingTotal + ' tagged', cls: S.taggingPct < 80 ? 'red' : 'green' }
  ];
  document.getElementById('kpis').innerHTML = kpiData.map(k =>
    '<div class="kpi"><div class="label">' + k.label + '</div><div class="val ' + (k.cls||'') + '">' + k.val + '</div><div class="sub2">' + (k.sub2||'') + '</div></div>'
  ).join('');

  // Progress bar
  const donePct = S.pctItemsDone;
  const inProgPct = Math.min(30, 100 - donePct);
  const todoPct = 100 - donePct - inProgPct;
  document.getElementById('status-bar').innerHTML =
    '<span style="width:' + donePct + '%;background:#1e6b36"></span>' +
    '<span style="width:' + inProgPct + '%;background:#e8a01e"></span>' +
    '<span style="width:' + todoPct + '%;background:#f0f0ec"></span>';
  document.getElementById('progress-legend').innerHTML =
    '<span style="color:#1e6b36">■</span> Done ' + S.doneItems + '&nbsp;&nbsp;' +
    '<span style="color:#e8a01e">■</span> In Progress (est.)&nbsp;&nbsp;' +
    '<span style="color:#bbb">■</span> To Do&nbsp;&nbsp;' +
    '<span style="color:#888">Ideal: ' + S.idealPct + '% (day ' + S.dayN + '/' + S.totalDays + ')</span>';

  // Verdict
  const vcMap = { green: '#1e6b36', amber: '#8a5a12', red: '#a63434' };
  document.getElementById('verdict').innerHTML =
    '<span class="label">Verdict</span>' +
    '<span class="val" style="color:' + (vcMap[S.verdictColor]||'#333') + '">' + S.verdictLabel + '</span>' +
    '<span class="pill ' + S.verdictColor + '">' + S.trueInjection.count + ' true injections · ' + (S.trueInjection.count/S.totalItems*100).toFixed(1) + '% items / ' + (S.trueInjection.sp/S.totalSP*100).toFixed(1) + '% SP</span>';

  // Scope table
  const scopeRows = [
    ['Pre-sprint (before 2026-06-03)', S.preSprint.count, S.preSprint.sp.toFixed(1), (S.preSprint.count/S.totalItems*100).toFixed(1)+'% / '+(S.preSprint.sp/S.totalSP*100).toFixed(1)+'%'],
    ['Day-1 dump (first 24h)', S.day1Dump.count, S.day1Dump.sp.toFixed(1), (S.day1Dump.count/S.totalItems*100).toFixed(1)+'% / '+(S.day1Dump.sp/S.totalSP*100).toFixed(1)+'%'],
    ['True mid-sprint injections', S.trueInjection.count, S.trueInjection.sp.toFixed(1), (S.trueInjection.count/S.totalItems*100).toFixed(1)+'% / '+(S.trueInjection.sp/S.totalSP*100).toFixed(1)+'%'],
    ['<strong>Sprint total</strong>', '<strong>'+S.totalItems+'</strong>', '<strong>'+S.totalSP.toFixed(1)+'</strong>', '—']
  ];
  document.getElementById('scope-table').innerHTML =
    '<thead><tr><th>Category</th><th class="num-right">Items</th><th class="num-right">SP</th><th>% of total</th></tr></thead><tbody>' +
    scopeRows.map(r => '<tr><td>' + r[0] + '</td><td class="num-right">' + r[1] + '</td><td class="num-right">' + r[2] + '</td><td>' + r[3] + '</td></tr>').join('') +
    '</tbody>';

  // Tagging
  const tagHTML = '<div style="font-size:24px;font-weight:600;color:' + (S.taggingPct>=80?'#1e6b36':'#a63434') + '">' + S.taggingPct + '%</div>' +
    '<div style="font-size:12px;color:#6b6b66;margin:2px 0 8px">' + S.taggingTagged + ' of ' + S.taggingTotal + ' post-start issues tagged</div>';
  let untaggedHTML = '';
  if (S.untaggedTrue.length > 0) {
    untaggedHTML = '<div class="tag-gap"><strong>⚠ Backfill needed (' + S.untaggedTrue.length + ' items)</strong>' +
      S.untaggedTrue.map(u => '<div style="margin-top:3px"><a href="' + JIRA_BASE + u.key + '" target="_blank">' + u.key + '</a> · ' + u.bucket + ' · ' + u.summary.substring(0,50) + ' — ' + u.assignee + '</div>').join('') +
      '</div>';
  }
  document.getElementById('tagging-section').innerHTML = tagHTML + untaggedHTML;

  // Injection timeline
  const tlRows = S.injectionTimeline.filter(r => r.day <= S.dayN).map(r => {
    if (r.issues.length === 0) {
      return '<tr><td class="muted">Day ' + r.day + '</td><td class="muted">' + r.date + '</td><td class="muted num-right">—</td><td class="muted num-right">—</td><td class="muted">No new items</td></tr>';
    }
    return r.issues.map((iss, i) =>
      '<tr>' +
      (i === 0 ? '<td rowspan="' + r.issues.length + '">Day ' + r.day + '</td><td rowspan="' + r.issues.length + '">' + r.date + '</td><td rowspan="' + r.issues.length + '" class="num-right">+' + r.items + '</td><td rowspan="' + r.issues.length + '" class="num-right">+' + r.sp.toFixed(1) + '</td>' : '') +
      '<td><a href="' + JIRA_BASE + iss.key + '" target="_blank">' + iss.key + '</a> ' + iss.summary.substring(0,55) +
      (iss.done ? ' <span class="pill green">Done</span>' : '') +
      '<br><span class="muted">' + iss.assignee + ' · ' + (iss.contamination ? '<span style="color:#1e6b36">' + iss.contamination + '</span>' : '<span style="color:#a63434">NO TAG</span>') + ' · ' + iss.bucket + '</span></td></tr>'
    ).join('');
  }).join('');
  document.getElementById('timeline-table').innerHTML =
    '<thead><tr><th>Day</th><th>Date</th><th class="num-right">+Items</th><th class="num-right">+SP</th><th>Issues</th></tr></thead><tbody>' + tlRows + '</tbody>';

  // Done table
  document.getElementById('done-table').innerHTML =
    '<thead><tr><th>Key</th><th>Summary</th><th class="num-right">SP</th><th>Assignee</th></tr></thead><tbody>' +
    S.doneIssues.map(d => '<tr><td><a href="' + JIRA_BASE + d.key + '" target="_blank">' + d.key + '</a></td><td>' + d.summary.substring(0,70) + '</td><td class="num-right">' + d.sp + '</td><td>' + d.assignee + '</td></tr>').join('') +
    '</tbody>';

  // Dashboard table
  const dbRows = [
    ['Priority changed', S.dashboard.priorityChanged + ' of ' + S.dashboard.priorityChangedOf + ' issues (' + S.dashboard.priorityChangedPct + '%)', 'Elevated — watch for instability'],
    ['Estimate changes', S.dashboard.estimateChanges + ' re-estimations', 'Clean'],
    ['Refinement count', S.dashboard.refinements + ' refinements', 'Not yet tracked for S5'],
    ['True injection rate (items)', (S.trueInjection.count/S.totalItems*100).toFixed(1) + '%', 'vs prior sprint final 21%'],
    ['Monthly churn rate', S.dashboard.churnRate + '%', 'Very healthy']
  ];
  document.getElementById('dashboard-table').innerHTML =
    '<thead><tr><th>Signal</th><th>Value</th><th>Context</th></tr></thead><tbody>' +
    dbRows.map(r => '<tr><td>' + r[0] + '</td><td>' + r[1] + '</td><td class="muted">' + r[2] + '</td></tr>').join('') +
    '</tbody>';

  // Assessment
  document.getElementById('assessment').innerHTML =
    '<strong>Assessment — 2026-06-08 (Day 6 of 14):</strong> ' +
    'Completion stands at 6.5% of items (9 / 183 SP, 4.9%) against an ideal pace of 42.9% — the team is meaningfully behind throughput expectations for mid-sprint. ' +
    'This is the primary risk: with 8 days remaining, the team needs to roughly double the pace to finish at a healthy rate. ' +
    'Scope injection remains low and stable (3.2% items / 2.2% SP, no new additions since 2026-06-04), which is a positive signal. ' +
    'Contamination tagging coverage remains at 40% (TRI-52985, TRI-53015, TRI-53019 untagged) — unchanged since 2026-06-05, should be addressed. ' +
    'The dashboard\'s priority-changed rate of 59.3% is elevated and worth monitoring for late-sprint instability.';

  // Burndown chart
  const labels = Array.from({length: S.totalDays + 1}, (_, i) => 'D' + i);
  const ideal = Array.from({length: S.totalDays + 1}, (_, i) => Math.round(S.totalItems * (1 - i / S.totalDays)));
  const actual = new Array(S.totalDays + 1).fill(null);
  actual[0] = S.totalItems;
  actual[S.dayN] = S.totalItems - S.doneItems;
  if (typeof Chart !== 'undefined') {
    new Chart(document.getElementById('burndown-chart'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: 'Ideal', data: ideal, borderColor: '#c8c8c0', borderDash: [4,4], pointRadius: 0, tension: 0 },
          { label: 'Actual', data: actual, borderColor: '#1e4f9d', backgroundColor: 'rgba(30,79,157,0.08)', pointRadius: 3, spanGaps: false, tension: 0.1 }
        ]
      },
      options: { plugins: { legend: { labels: { font: { size: 11 } } } }, scales: { y: { min: 0, title: { display: true, text: 'Items remaining', font: { size: 10 } } }, x: { ticks: { font: { size: 10 } } } } }
    });

    // Injection chart
    const injAccum = Array.from({length: S.dayN + 1}, (_, i) => {
      if (i === 0) return 0;
      return S.injectionTimeline.filter(r => r.day <= i).reduce((s, r) => s + r.items, 0);
    });
    new Chart(document.getElementById('injection-chart'), {
      type: 'bar',
      data: {
        labels: Array.from({length: S.dayN + 1}, (_, i) => 'D' + i),
        datasets: [{ label: 'Cumulative injections', data: injAccum, backgroundColor: 'rgba(139,90,18,0.6)', borderColor: '#8a5a12', borderWidth: 1 }]
      },
      options: { plugins: { legend: { labels: { font: { size: 11 } } } }, scales: { y: { min: 0, ticks: { stepSize: 1, font: { size: 10 } }, title: { display: true, text: 'Items', font: { size: 10 } } }, x: { ticks: { font: { size: 10 } } } } }
    });
  }

  // Footer
  document.getElementById('footer').textContent = 'Frozen snapshot · 2026-06-08 · RSE 26Q2 S5 · Generated daily at 9am Pacific';
});
</script>
</body>
</html>
