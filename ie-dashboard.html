<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IE Team Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(59,130,246,0.3); }
            50%       { box-shadow: 0 0 30px rgba(59,130,246,0.6); }
        }
        @keyframes shimmer {
            0%   { background-position: -1000px 0; }
            100% { background-position:  1000px 0; }
        }
        .animate-slide-in { animation: slideInUp 0.6s ease-out forwards; opacity: 0; }
        .card-hover { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
        .card-hover:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.2); }
        .glass-effect { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
        .status-badge { animation: pulse-glow 2s ease-in-out infinite; }
        .progress-bar { transition: width 1s ease-out; }
        .metric-icon { transition: transform 0.3s ease; }
        .card-hover:hover .metric-icon { transform: rotate(10deg) scale(1.1); }
        @keyframes countUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .count-animate { animation: countUp 0.5s ease-out; }
        .tooltip-container { position: relative; display: inline-block; }
        .tooltip-text { display: none; }
        #global-tooltip {
            visibility: hidden;
            opacity: 0;
            width: 220px;
            background-color: #1e293b;
            color: #fff;
            font-size: 0.75rem;
            border-radius: 8px;
            padding: 10px 12px;
            position: fixed;
            z-index: 9999;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: opacity 0.15s ease;
            pointer-events: none;
        }
        .shimmer-bg { background: linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent); background-size: 200% 100%; animation: shimmer 2s infinite; }
        .tab-button { transition: all 0.3s ease; }
        .tab-button.active { background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); color: white; box-shadow: 0 4px 15px rgba(102,126,234,0.4); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideInUp 0.4s ease-out; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 min-h-screen">
<div class="w-full min-h-screen p-6 md:p-8">
<div class="max-w-7xl mx-auto">

    <!-- ── Header ─────────────────────────────────────────────────────────── -->
    <div class="mb-8 animate-slide-in" style="animation-delay:0.1s;">
        <div class="flex items-center justify-between flex-wrap gap-4">
            <div>
                <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 bg-clip-text text-transparent mb-2">
                    IE Team Dashboard
                </h1>
                <p class="text-slate-600 text-lg">Team performance metrics and backlog health analysis</p>
            </div>
            <div class="flex items-center gap-3 glass-effect px-4 py-2 rounded-full">
                <div class="w-2 h-2 bg-green-500 rounded-full status-badge"></div>
                <span class="text-sm font-medium text-slate-700">Live</span>
                <span class="text-xs text-slate-500">Updated: <span id="lastUpdated">March 11, 2026 at 03:27 PM</span></span>
            </div>
        </div>
    </div>

    <!-- ── Tab Navigation ─────────────────────────────────────────────────── -->
    <div class="mb-8 glass-effect rounded-2xl shadow-lg p-2 animate-slide-in" style="animation-delay:0.12s;">
        <div class="flex flex-wrap gap-2">
            <button onclick="switchTab('current',event)" class="tab-button active flex-1 min-w-fit px-6 py-3 rounded-xl font-semibold text-slate-700 hover:bg-slate-100">
                <span class="flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                    </svg>
                    Current Sprint
                </span>
            </button>
            <button onclick="switchTab('historical',event)" class="tab-button flex-1 min-w-fit px-6 py-3 rounded-xl font-semibold text-slate-700 hover:bg-slate-100">
                <span class="flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                    </svg>
                    Historical Trends
                </span>
            </button>
        </div>
    </div>

    <!-- ════════════════════════════════════════════════════════════════════ -->
    <!-- CURRENT SPRINT TAB                                                  -->
    <!-- ════════════════════════════════════════════════════════════════════ -->
    <div id="current-tab" class="tab-content active">

        <!-- ── Sprint Breakdown ──────────────────────────────────────────── -->
        <div class="mb-8">
            <div class="flex items-center justify-between flex-wrap gap-4 mb-6 animate-slide-in" style="animation-delay:0.15s;">
                <h2 class="text-2xl font-bold text-slate-800 flex items-center">
                    <span class="w-1 h-8 bg-gradient-to-b from-indigo-500 to-purple-500 rounded-full mr-3"></span>
                    Current Sprint Breakdown
                </h2>
